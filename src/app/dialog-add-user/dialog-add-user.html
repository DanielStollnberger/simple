    <mat-dialog-content style="position: relative;">
        @if(loading){
        <mat-progress-bar mode="query"></mat-progress-bar>
        }
        <div class="df">
            <p class="mr-16">
                <mat-form-field appearance="outline">
                    <mat-label>Name</mat-label>
                    <input matInput [(ngModel)]="user.lastName" placeholder="Name">
                    <!-- <mat-hint>Hint</mat-hint> -->
                </mat-form-field>
            </p>
            <p>
                <mat-form-field appearance="outline">
                    <mat-label>First Name</mat-label>
                    <input matInput [(ngModel)]="user.firstName" placeholder="First Name">
                    <!-- <mat-hint>Hint</mat-hint> -->
                </mat-form-field>
            </p>
        </div>
        <div class="df">
            <mat-form-field class="w100">
                <mat-label>Choose a date</mat-label>
                <input matInput [(ngModel)]="user.birthdate" name="birthdate" [matDatepicker]="picker">
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
        </div>
        <div>
            <p class="mr-16" class="w100">
                <mat-form-field appearance="outline" class="w100">
                    <mat-label>Street + House No.</mat-label>
                    <input matInput [(ngModel)]="user.street" placeholder="Street + House No.">
                    <!-- <mat-hint>Hint</mat-hint> -->
                </mat-form-field>
            </p>
        </div>
        <div class="df">
            <p class="mr-16">
                <mat-form-field appearance="outline">
                    <mat-label>City</mat-label>
                    <input matInput [(ngModel)]="user.city" placeholder="City">
                    <!-- <mat-hint>Hint</mat-hint> -->
                </mat-form-field>
            </p>
            <p>
                <mat-form-field appearance="outline">
                    <mat-label>Zipcode</mat-label>
                    <input matInput [(ngModel)]="user.zip" placeholder="Zipcode">
                    <!-- <mat-hint>Hint</mat-hint> -->
                </mat-form-field>
            </p>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions>
        <button matButton color="primary" (click)="closeDialog()">Cancel</button>
        <button matButton cdkFocusInitial color="primary" (click)="saveUser()">Save</button>
    </mat-dialog-actions>
