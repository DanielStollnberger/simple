<mat-dialog-content>
    <div class="df">
        <p class="mr-16">
            <mat-form-field appearance="outline">
                <input matInput placeholder="Name">
                <!-- <mat-hint>Hint</mat-hint> -->
            </mat-form-field>
        </p>
        <p>
            <mat-form-field appearance="outline">
                <input matInput placeholder="First Name">
                <!-- <mat-hint>Hint</mat-hint> -->
            </mat-form-field>
        </p>
    </div>
    <div class="df">
        <mat-form-field class="w100">
            <mat-label>Choose a date</mat-label>
            <input matInput [matDatepicker]="picker">
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
    </div>
    <div>
        <p class="mr-16" class="w100">
            <mat-form-field appearance="outline" class="w100">
                <input matInput placeholder="Street + House No.">
                <!-- <mat-hint>Hint</mat-hint> -->
            </mat-form-field>
        </p>
    </div>
    <div class="df">
        <p class="mr-16">
            <mat-form-field appearance="outline">
                <input matInput placeholder="City">
                <!-- <mat-hint>Hint</mat-hint> -->
            </mat-form-field>
        </p>
        <p>
            <mat-form-field appearance="outline">
                <input matInput placeholder="Zipcode">
                <!-- <mat-hint>Hint</mat-hint> -->
            </mat-form-field>
        </p>
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <button matButton color="primary">Cancel</button>
    <button matButton cdkFocusInitial color="primary">Save</button>
</mat-dialog-actions>
