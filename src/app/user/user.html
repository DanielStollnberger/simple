<mat-card class="example-card" appearance="outlined">
        <table class="user-table">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
            </tr>

            @for (user of this.users; track $index) {
            <tr [routerLink]="['/user/', user.id]">
                <td>{{ user.firstName }} {{ user.lastName}}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.city }}</td>
            </tr>
            }
        </table>
</mat-card>

<button matFab matTooltip="Add User" (click)="openDialog()" class="add-user-btn">
    <mat-icon>add</mat-icon>
</button>
